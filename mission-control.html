<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Mission Control 🚀</title>
    <style>
        :root {
            --primary:    #4cc9f0;
            --secondary:  #4895ef;
            --accent:     #f72585;
            --success:    #4caf50;
            --danger:     #ef4444;
            --warning:    #f59e0b;
            --bg-color:   #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f2fe;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
            background: white;
            width: 100%;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
            box-sizing: border-box;
            border-bottom: 4px solid transparent;
        }
        h1 { margin: 0 0 10px; }

        .robot-selector {
            margin-bottom: 15px;
        }
        
        .robot-selector select {
            padding: 8px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid var(--secondary);
            background: var(--bg-color);
            cursor: pointer;
            outline: none;
        }

        .header-conn-row {
            display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
        }

        .status-dot {
            height: 12px; width: 12px; border-radius: 50%; background: #cbd5e1;
            transition: background 0.3s;
        }
        .connected .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
        header.connected { border-bottom-color: var(--success); }

        .btn {
            border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
        }
        .btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
        .btn:active:not(:disabled) { transform: scale(0.95); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-connect { background: var(--secondary); color: white; }
        .btn-disconnect { background: var(--danger); color: white; }

        /* ── Tabs ───────────────────────────────────────── */
        .tabs {
            display: flex; gap: 5px; margin-top: 20px; flex-wrap: wrap; justify-content: center;
        }
        .tab-btn {
            padding: 10px 20px; border: none; background: #cbd5e1; border-radius: 10px 10px 0 0;
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s;
        }
        .tab-btn.active { background: white; color: var(--secondary); box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }

        /* ── Main Workspace ─────────────────────────────── */
        main {
            background: white; width: 95%; max-width: 1000px;
            border-radius: 0 0 20px 20px; padding: 20px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            min-height: 500px; display: flex; flex-direction: column;
        }

        .tab-content { display: none; flex-grow: 1; }
        .tab-content.active { display: flex; flex-direction: column; gap: 20px; }

        /* Grade Toolboxes */
        .toolbox { display: flex; gap: 10px; padding: 15px; background: var(--bg-color); border-radius: 12px; flex-wrap: wrap; align-items: center; justify-content: center;}
        .g4-toolbox { background: #e2e8f0; }

        /* Grade 2: Pure Visual */
        .g2-btn { font-size: 3rem; background: white; border: 4px solid #e2e8f0; border-radius: 20px; padding: 15px; cursor: pointer; }
        .g2-btn:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* Grade 3: Labeled Blocks */
        .g3-btn { font-size: 1.5rem; background: white; border: 3px solid #cbd5e1; border-radius: 15px; padding: 10px 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;}
        .g3-btn:hover { border-color: var(--accent); }

        /* Grade 4: Pseudo-code */
        .g4-btn { font-family: monospace; font-size: 1.1rem; background: #1e293b; color: #a5b4fc; border: none; border-radius: 8px; padding: 12px 15px; cursor: pointer; }
        .g4-btn:hover { background: #334155; color: white; }

        /* Grade 5: Scratch Style */
        .g5-btn { 
            background: var(--primary); color: white; border: none; font-weight: bold; padding: 15px 20px; 
            border-radius: 4px; position: relative; cursor: pointer; display: inline-block;
            clip-path: polygon(0 0, 15px 0, 25px 10px, 40px 10px, 50px 0, 100% 0, 100% calc(100% - 10px), 50px calc(100% - 10px), 40px 100%, 25px 100%, 15px calc(100% - 10px), 0 calc(100% - 10px));
            margin-bottom: -5px;
        }
        .g5-btn:hover { filter: brightness(1.1); }
        .g5-btn.action { background: var(--secondary); }
        .g5-btn.event { background: var(--warning); clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), 50px calc(100% - 10px), 40px 100%, 25px 100%, 15px calc(100% - 10px), 0 calc(100% - 10px)); border-radius: 15px 15px 4px 4px; }

        /* ── Mission Strip ──────────────────────────────── */
        .mission-area { margin-top: 20px; flex-grow: 1;}
        .mission-strip {
            display: flex; flex-wrap: wrap; gap: 10px; min-height: 120px;
            background: #f1f5f9; border: 3px dashed #cbd5e1; border-radius: 15px; padding: 15px;
            align-content: flex-start;
        }
        .g4-strip { flex-direction: column; background: #334155; border-color: #1e293b; }
        .g5-strip { flex-direction: column; gap: 0; padding: 20px; align-items: flex-start; }
        
        .mission-item {
            background: var(--primary); color: white; padding: 12px 18px; border-radius: 10px;
            font-weight: bold; position: relative; animation: popIn 0.2s; font-size: 1.2rem;
        }
        .g5-strip .mission-item {
            clip-path: polygon(0 0, 15px 0, 25px 10px, 40px 10px, 50px 0, 100% 0, 100% calc(100% - 10px), 50px calc(100% - 10px), 40px 100%, 25px 100%, 15px calc(100% - 10px), 0 calc(100% - 10px));
            border-radius: 4px; margin-bottom: -4px; padding: 15px 20px 25px 20px; z-index: 1;
        }
        
        .mission-item .remove {
            position: absolute; top: -5px; right: -5px; background: var(--danger); color: white;
            border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; z-index: 10;
        }
        .active-glow { box-shadow: 0 0 15px 5px var(--accent) !important; transform: scale(1.1); z-index: 20; background: var(--accent) !important; }

        /* ── Controls ───────────────────────────────────── */
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-go { background: var(--success); color: white; font-size: 1.5rem; flex-grow: 1; padding: 15px; border-radius: 12px; }
        .btn-clear { background: #94a3b8; color: white; padding: 15px; border-radius: 12px; font-size: 1.1rem; }

        /* ── Dev Panel ──────────────────────────────────── */
        .dev-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .terminal { background: #0f172a; color: #34d399; font-family: monospace; padding: 15px; border-radius: 10px; flex-grow: 1; overflow-y: auto; height: 200px; }
        .cmd-line { display: flex; gap: 10px; }
        .cmd-line input { flex-grow: 1; padding: 12px; font-family: monospace; font-size: 1.1rem; border: 2px solid #cbd5e1; border-radius: 8px; }

        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<header id="header-bar">
    <h1>Mission Control 🚀</h1>
    
    <div class="robot-selector">
        <select id="robot-select" onchange="switchRobot(this.value)">
            <option value="bittle">🤖 Petoi Bittle</option>
            <option value="mbot">🚗 Makeblock mBot</option>
        </select>
    </div>

    <div class="header-conn-row">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Disconnected</span>
        <button id="connect-btn" class="btn btn-connect" onclick="toggleConnection()">⚡ Connect via BLE</button>
    </div>
    <div id="last-updated" style="font-size: 0.85rem; color: #64748b; margin-top: 10px;"></div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('g2')">Grade 2</button>
    <button class="tab-btn" onclick="switchTab('g3')">Grade 3</button>
    <button class="tab-btn" onclick="switchTab('g4')">Grade 4</button>
    <button class="tab-btn" onclick="switchTab('g5')">Grade 5</button>
    <button class="tab-btn" onclick="switchTab('dev')">⚙️ Dev</button>
</div>

<main>
    <div id="active-tab-content" class="tab-content active">
        <div id="dynamic-toolbox" class="toolbox">
            </div>
        <div class="mission-area">
            <h3 id="mission-title" style="margin-top:0; color: #64748b;">My Program</h3>
            <div id="mission-strip" class="mission-strip"></div>
        </div>
    </div>

    <div id="dev" class="tab-content">
        <div id="terminal" class="terminal">Welcome to Dev Terminal...<br></div>
        <div class="cmd-line">
            <input type="text" id="raw-input" placeholder="Type raw command and press Enter...">
            <button class="btn btn-connect" onclick="submitRaw()">Send</button>
        </div>
    </div>

    <div id="universal-controls" class="controls">
        <button id="btn-go" class="btn btn-go" onclick="runMission()">▶ RUN CODE</button>
        <button class="btn btn-clear" onclick="clearMission()">🗑️ Clear</button>
    </div>
</main>

<script>
// ════════════════════════════════════════════════════════════
// ROBOT CONFIGURATION & COMMAND LIBRARIES
// ════════════════════════════════════════════════════════════

// Defines how the app talks to each specific robot over Bluetooth
const ROBOT_PROFILES = {
    bittle: {
        name: "Petoi Bittle",
        serviceUUID: '0000ffe0-0000-1000-8000-00805f9b34fb',
        charUUID:    '0000ffe1-0000-1000-8000-00805f9b34fb',
        formatPayload: (cmd) => new TextEncoder('utf-8').encode(cmd + '\n'),
        filters: [{ namePrefix: 'Bittle' }, { namePrefix: 'bittle' }]
    },
    mbot: {
        name: "Makeblock mBot",
        // Note: Makeblock uses different BLE UUIDs depending on the dongle. 
        // FFE1 is standard for Makeblock BLE modules.
        serviceUUID: '0000ffe1-0000-1000-8000-00805f9b34fb', 
        charUUID:    '0000ffe2-0000-1000-8000-00805f9b34fb',
        formatPayload: (cmdArray) => new Uint8Array(cmdArray),
        filters: [{ namePrefix: 'Makeblock' }, { namePrefix: 'mBot' }]
    }
};

// The libraries that draw the toolboxes for each robot in each grade
const COMMAND_LIBRARIES = {
    bittle: {
        g2: [
            { label: 'Walk', code: 'kwkF', icon: '🚶', class: 'g2-btn' },
            { label: 'Sit',  code: 'ksit', icon: '🪑', class: 'g2-btn' },
            { label: 'Wave', code: 'khi',  icon: '👋', class: 'g2-btn' },
            { label: 'Flip', code: 'kbk',  icon: '🤸', class: 'g2-btn' }
        ],
        g3: [
            { label: 'Walk Fwd', code: 'kwkF', icon: '🚶', class: 'g3-btn' },
            { label: 'Sit Down', code: 'ksit', icon: '🪑', class: 'g3-btn' },
            { label: 'Say Hi',   code: 'khi',  icon: '👋', class: 'g3-btn' },
            { label: 'Pushup',   code: 'kpu',  icon: '💪', class: 'g3-btn' }
        ],
        g4: [
            { label: 'robot.walk();',    code: 'kwkF', icon: '', class: 'g4-btn' },
            { label: 'robot.sit();',     code: 'ksit', icon: '', class: 'g4-btn' },
            { label: 'robot.wave();',    code: 'khi',  icon: '', class: 'g4-btn' },
            { label: 'robot.stretch();', code: 'kstr', icon: '', class: 'g4-btn' }
        ],
        g5: [
            { label: 'When 🟢 Clicked',   code: '',     icon: '🏁', class: 'g5-btn event' },
            { label: 'Move Steps (Walk)', code: 'kwkF', icon: '🟦', class: 'g5-btn action' },
            { label: 'Change Pose (Sit)', code: 'ksit', icon: '🟦', class: 'g5-btn action' },
            { label: 'Play Anim (Wave)',  code: 'khi',  icon: '🟦', class: 'g5-btn action' }
        ]
    },
    mbot: {
        g2: [
            // Example mBot Hex Codes: [Header, Header, Length, Index, Action, Device, Port, Value1, Value2...]
            { label: 'Drive', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0x50, 0x00], icon: '⬆️', class: 'g2-btn' },
            { label: 'Reverse', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0xb0, 0xff], icon: '⬇️', class: 'g2-btn' },
            { label: 'Honk', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x22, 0x00, 0x00], icon: '📢', class: 'g2-btn' },
            { label: 'Lights', code: [0xff, 0x55, 0x09, 0x00, 0x02, 0x08, 0x00, 0x00, 0xff, 0x00, 0x00], icon: '💡', class: 'g2-btn' }
        ],
        g3: [
            { label: 'Drive Fwd', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0x50, 0x00], icon: '⬆️', class: 'g3-btn' },
            { label: 'Back Up', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0xb0, 0xff], icon: '⬇️', class: 'g3-btn' },
            { label: 'Honk Horn', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x22, 0x00, 0x00], icon: '📢', class: 'g3-btn' }
        ],
        g4: [
            { label: 'mbot.drive(100);', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0x50, 0x00], icon: '', class: 'g4-btn' },
            { label: 'mbot.honk();', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x22, 0x00, 0x00], icon: '', class: 'g4-btn' }
        ],
        g5: [
            { label: 'When 🟢 Clicked', code: '', icon: '🏁', class: 'g5-btn event' },
            { label: 'Set Motor Speed 100', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x05, 0x50, 0x00], icon: '🟦', class: 'g5-btn action' },
            { label: 'Play Sound (Buzzer)', code: [0xff, 0x55, 0x05, 0x00, 0x02, 0x22, 0x00, 0x00], icon: '🟦', class: 'g5-btn action' }
        ]
    }
};

// ════════════════════════════════════════════════════════════
// STATE & UI GENERATION
// ════════════════════════════════════════════════════════════
let activeRobotId = 'bittle';
let currentTab = 'g2';
let mission = [];
let isRunning = false;

function switchRobot(robotId) {
    // If we are switching to a new robot, disconnect the old one first
    if (isConnected && activeRobotId !== robotId) disconnectBLE();
    
    activeRobotId = robotId;
    clearMission();
    logTerminal(`Switched active profile to: ${ROBOT_PROFILES[robotId].name}`, 'info');
    
    // Redraw the UI for the new robot
    buildUI();
}

function switchTab(tabId) {
    // Safely update active buttons
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    const btn = document.querySelector(`button[onclick="switchTab('${tabId}')"]`);
    if(btn) btn.classList.add('active');

    currentTab = tabId;

    if (tabId === 'dev') {
        document.getElementById('active-tab-content').style.display = 'none';
        document.getElementById('dev').style.display = 'flex';
        document.getElementById('universal-controls').style.display = 'none';
    } else {
        document.getElementById('dev').style.display = 'none';
        document.getElementById('active-tab-content').style.display = 'flex';
        document.getElementById('universal-controls').style.display = 'flex';
        buildUI(); // Redraw the blocks for this specific grade
    }
}

function buildUI() {
    const toolbox = document.getElementById('dynamic-toolbox');
    const strip = document.getElementById('mission-strip');
    const title = document.getElementById('mission-title');
    
    toolbox.innerHTML = '';
    
    // Apply styling based on grade
    toolbox.className = currentTab === 'g4' ? 'toolbox g4-toolbox' : 'toolbox';
    strip.className = 'mission-strip'; // Reset
    if (currentTab === 'g4') strip.classList.add('g4-strip');
    if (currentTab === 'g5') strip.classList.add('g5-strip');

    // Set dynamic title
    const titles = { g2: "My Story Sequence", g3: "My Program", g4: "Script", g5: "Canvas" };
    title.innerText = titles[currentTab];

    // Generate Buttons
    const commands = COMMAND_LIBRARIES[activeRobotId][currentTab];
    if (commands) {
        commands.forEach(cmd => {
            const btn = document.createElement('div');
            btn.className = cmd.class;
            btn.innerHTML = currentTab === 'g2' ? cmd.icon : `${cmd.icon} ${cmd.label}`;
            // If G4, we don't use icons generally
            if(currentTab === 'g4') btn.innerHTML = cmd.label;
            
            // Allow storing object data securely by using a closure
            btn.onclick = () => addCmd(cmd);
            toolbox.appendChild(btn);
        });
    }
    
    renderMission();
}

function addCmd(cmdObj) {
    // Structural block check
    if (cmdObj.code === '') {
        if (mission.length === 0) mission.push({ ...cmdObj, id: Date.now() });
        renderMission();
        return;
    }
    mission.push({ ...cmdObj, id: Date.now() });
    renderMission();
}

function removeCmd(index) {
    mission.splice(index, 1);
    renderMission();
}

function clearMission() {
    mission = [];
    renderMission();
}

function renderMission() {
    const strip = document.getElementById('mission-strip');
    strip.innerHTML = '';
    
    mission.forEach((cmd, index) => {
        const div = document.createElement('div');
        div.className = 'mission-item';
        div.id = `cmd-${index}`;
        
        if (currentTab === 'g2') div.innerHTML = `<span style="font-size: 2rem;">${cmd.icon}</span>`;
        else if (currentTab === 'g3') div.innerHTML = `${cmd.icon} ${cmd.label}`;
        else if (currentTab === 'g4') {
            div.style.background = 'transparent'; div.style.color = '#34d399'; div.style.fontFamily = 'monospace'; div.style.padding = '5px';
            div.innerText = cmd.label;
        }
        else if (currentTab === 'g5') {
            div.style.background = cmd.code === '' ? 'var(--warning)' : 'var(--secondary)';
            div.innerText = cmd.label;
        }

        const rm = document.createElement('div');
        rm.className = 'remove'; rm.innerHTML = '×';
        rm.onclick = (e) => { e.stopPropagation(); removeCmd(index); };
        div.appendChild(rm);
        strip.appendChild(div);
    });
}

function logTerminal(msg, type="info") {
    const term = document.getElementById('terminal');
    const color = type === "rx" ? "#60a5fa" : (type === "tx" ? "#f472b6" : "#34d399");
    const prefix = type === "rx" ? "⬅ " : (type === "tx" ? "➡ " : "• ");
    term.innerHTML += `<span style="color:${color}">${prefix}${msg}</span><br>`;
    term.scrollTop = term.scrollHeight;
}


// ════════════════════════════════════════════════════════════
// BLUETOOTH (BLE) CONNECTION (UNIVERSAL)
// ════════════════════════════════════════════════════════════
let bleDevice = null;
let bleServer = null;
let bleCharacteristic = null;
let isConnected = false;

async function toggleConnection() {
    if (isConnected) await disconnectBLE();
    else await connectBLE();
}

async function connectBLE() {
    if (!navigator.bluetooth) {
        alert("Web Bluetooth is not supported in this browser. Please use Chrome or Edge.");
        return;
    }

    const profile = ROBOT_PROFILES[activeRobotId];

    try {
        logTerminal(`Searching for ${profile.name}...`);
        
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: profile.filters,
            optionalServices: [profile.serviceUUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        logTerminal("Connecting to Server...");
        bleServer = await bleDevice.gatt.connect();

        logTerminal("Getting Service...");
        const service = await bleServer.getPrimaryService(profile.serviceUUID);

        logTerminal("Getting Characteristic...");
        bleCharacteristic = await service.getCharacteristic(profile.charUUID);
        
        await bleCharacteristic.startNotifications();
        bleCharacteristic.addEventListener('characteristicvaluechanged', handleBLEData);

        isConnected = true;
        updateUI();
        logTerminal(`✅ ${profile.name} Connected!`, "info");

        // If Bittle, silence random mind automatically
        if (activeRobotId === 'bittle') {
            setTimeout(() => sendRaw('z'), 1000); 
        }

    } catch (error) {
        logTerminal(`Connection failed: ${error}`, "info");
        console.error(error);
    }
}

async function disconnectBLE() {
    if (!bleDevice || !bleDevice.gatt.connected) return;
    logTerminal("Disconnecting...");
    bleDevice.gatt.disconnect();
}

function onDisconnected() {
    isConnected = false;
    bleDevice = null; bleServer = null; bleCharacteristic = null;
    logTerminal("❌ Disconnected.", "info");
    updateUI();
}

function updateUI() {
    const header = document.getElementById('header-bar');
    const status = document.getElementById('status-text');
    const btn = document.getElementById('connect-btn');

    if (isConnected) {
        header.classList.add('connected');
        status.innerHTML = `<b>${ROBOT_PROFILES[activeRobotId].name} Connected! 🔵</b>`;
        btn.textContent = '❌ Disconnect';
        btn.className = 'btn btn-disconnect';
        document.getElementById('robot-select').disabled = true; // Lock dropdown
    } else {
        header.classList.remove('connected');
        status.textContent = 'Disconnected';
        btn.textContent = '⚡ Connect via BLE';
        btn.className = 'btn btn-connect';
        document.getElementById('robot-select').disabled = false; // Unlock dropdown
    }
}

function handleBLEData(event) {
    const value = event.target.value;
    // Bittle sends strings back, mBot sends byte arrays. We'll just try to decode as string for logs.
    const decoder = new TextDecoder('utf-8');
    const text = decoder.decode(value);
    logTerminal(text.trim(), "rx");
}

async function sendRaw(cmdCode) {
    if (!isConnected || !bleCharacteristic) {
        logTerminal("Cannot send: Not connected.", "info");
        return;
    }
    try {
        // Use the active profile to format the command properly (String vs Bytes)
        const payload = ROBOT_PROFILES[activeRobotId].formatPayload(cmdCode);
        await bleCharacteristic.writeValue(payload);
        
        // Log what was sent
        const logMsg = Array.isArray(cmdCode) ? `[Byte Array sent]` : cmdCode;
        logTerminal(logMsg, "tx");
    } catch (e) {
        logTerminal(`Send Error: ${e}`, "info");
    }
}

// Dev Terminal Input Handler
function submitRaw() {
    const input = document.getElementById('raw-input');
    const val = input.value.trim();
    if(val) { 
        // Note: For mBot, raw terminal strings won't work easily unless converted to byte arrays. 
        // This input assumes Bittle strings primarily.
        sendRaw(val); 
        input.value = ''; 
    }
}
document.getElementById('raw-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') submitRaw();
});

// ════════════════════════════════════════════════════════════
// MISSION EXECUTION
// ════════════════════════════════════════════════════════════
async function runMission() {
    if (!isConnected) {
        alert('Please connect via BLE first!');
        return;
    }
    if (mission.length === 0 || isRunning) return;

    isRunning = true;
    const btnGo = document.getElementById('btn-go');
    btnGo.disabled = true;
    btnGo.textContent = '⏳ RUNNING...';

    // Execution Loop
    for (let i = 0; i < mission.length; i++) {
        const cmd = mission[i];
        if (cmd.code === '') continue; // Skip structural blocks

        // Highlight active
        document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('active-glow'));
        const activeDom = document.getElementById(`cmd-${i}`);
        if (activeDom) activeDom.classList.add('active-glow');

        // Send Command
        await sendRaw(cmd.code);
        
        // Wait 2.5 seconds for animation to complete
        await new Promise(r => setTimeout(r, 2500));
    }

    document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('active-glow'));
    isRunning = false;
    btnGo.disabled = false;
    btnGo.innerHTML = '▶ RUN CODE';
}

// ════════════════════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════════════════════

// 1. Build UI for the default robot (Bittle) and Tab (G2)
buildUI();

// 2. Display Last Updated Timestamp safely
try {
    const lastUpdatedElement = document.getElementById('last-updated');
    const modifiedDate = new Date(document.lastModified);
    const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' };
    lastUpdatedElement.innerText = "Last Updated: " + modifiedDate.toLocaleString(undefined, options);
} catch (e) {
    console.warn("Could not set last updated text", e);
}

</script>
